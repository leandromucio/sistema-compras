<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Compras</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#1a1a1a;font-size:14px;line-height:1.5}
input,select{font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid #d1d5db;border-radius:6px;width:100%;outline:none;background:#fff;transition:border-color .15s}
input:focus,select:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
input.auto-filled{border-color:#16a34a;background:#f0fdf4}
input.new-sku{border-color:#f59e0b;background:#fffbeb}
button{font-family:inherit;cursor:pointer;transition:all .15s}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 10px;font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #e5e7eb;white-space:nowrap;background:#f9fafb}
td{padding:9px 10px;border-bottom:1px solid #f3f4f6}
tr:hover td{background:#f9fafb}
.wrap{max-width:1200px;margin:0 auto}
.header{background:#1e293b;color:#fff;padding:0 20px;position:sticky;top:0;z-index:50}
.header-top{display:flex;align-items:center;justify-content:space-between;height:52px}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px}
.logo-icon{width:30px;height:30px;background:#3b82f6;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.user-area{display:flex;align-items:center;gap:12px;font-size:13px;color:#94a3b8}
.tabs{display:flex;overflow-x:auto;gap:0}
.tab{background:none;border:none;color:#94a3b8;padding:12px 18px;font-size:13px;font-weight:500;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap}
.tab:hover{color:#e2e8f0}
.tab.on{color:#fff;border-bottom-color:#3b82f6}
.content{padding:24px 20px}
.page-title{font-size:18px;font-weight:700;margin-bottom:20px;color:#111}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:20px}
.card+.card{margin-top:16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.g4b{display:grid;grid-template-columns:2fr 2fr 1fr auto;gap:8px;align-items:end}
label.L{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:4px}
.btn{padding:7px 16px;border-radius:6px;border:1px solid #d1d5db;background:#fff;color:#374151;font-size:13px;font-weight:500}
.btn:hover{background:#f9fafb}
.btn-blue{background:#3b82f6;color:#fff;border-color:#3b82f6}
.btn-blue:hover{background:#2563eb}
.btn-blue:disabled{background:#93c5fd;border-color:#93c5fd;cursor:not-allowed;opacity:.7}
.btn-green{background:#16a34a;color:#fff;border-color:#16a34a}
.btn-green:hover{background:#15803d}
.btn-red{color:#dc2626;border-color:#fca5a5}
.btn-red:hover{background:#fef2f2}
.btn-sm{padding:4px 10px;font-size:12px}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-pagar{background:#fef3c7;color:#92400e}
.b-paga{background:#d1fae5;color:#065f46}
.b-info{background:#dbeafe;color:#1e40af}
.b-admin{background:#fef3c7;color:#92400e}
.b-warn{background:#fef3c7;color:#92400e}
.b-new{background:#fef9c3;color:#854d0e;border:1px dashed #fbbf24}
/* metric cards */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.metric{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:12px 16px}
.metric .m-lbl{font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.4px}
.metric .m-val{font-size:20px;font-weight:700;margin-top:4px}
.metric .m-sub{font-size:11px;color:#9ca3af;margin-top:2px}
.metric.m-blue{border-color:#bfdbfe}.metric.m-blue .m-val{color:#1d4ed8}
.metric.m-orange{border-color:#fed7aa}.metric.m-orange .m-val{color:#c2410c}
.metric.m-green{border-color:#bbf7d0}.metric.m-green .m-val{color:#15803d}
/* autocomplete */
.ac-wrap{position:relative}
.ac-drop{position:absolute;top:100%;left:0;right:0;z-index:300;background:#fff;border:1px solid #d1d5db;border-radius:8px;margin-top:3px;max-height:240px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.ac-item{padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #f9fafb;display:flex;align-items:center;justify-content:space-between}
.ac-item:last-child{border-bottom:none}
.ac-item:hover{background:#eff6ff}
.ac-match{font-weight:700;color:#2563eb}
.ac-new{font-size:11px;padding:2px 6px;border-radius:4px;background:#fef9c3;color:#854d0e;border:1px dashed #fbbf24}
.ac-add-row{padding:10px 12px;cursor:pointer;font-size:13px;color:#2563eb;font-weight:600;background:#eff6ff;border-top:1px solid #dbeafe}
.ac-add-row:hover{background:#dbeafe}
/* nota buttons */
.nota-wrap{display:flex;gap:6px;margin-top:4px}
.nota-btn{flex:1;padding:9px;border-radius:6px;border:1.5px solid #d1d5db;background:#fff;color:#6b7280;font-size:13px;font-weight:500;cursor:pointer}
.nota-btn.on-pagar{background:#fef3c7;border-color:#f59e0b;color:#92400e}
.nota-btn.on-paga{background:#d1fae5;border-color:#34d399;color:#065f46}
/* calc box */
.calc{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:16px;margin-top:20px}
.calc-title{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
/* filter */
.fbox{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:14px;margin-bottom:16px}
.fbox-title{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
/* commission hint */
.hint{font-size:12px;margin-top:4px;display:flex;align-items:center;gap:5px}
.hint-ok{color:#16a34a}.hint-warn{color:#b45309}.hint-new{color:#854d0e}
/* inline edit */
.ie{width:100%;font-size:12px;padding:4px 7px;border:1px solid #93c5fd;border-radius:4px;background:#eff6ff}
/* new commission modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:400;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;padding:24px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
/* pagination */
.pagi{display:flex;align-items:center;gap:10px;justify-content:center;margin-top:16px;font-size:13px;color:#6b7280}
/* import */
.import-mode{display:flex;gap:8px}
.im-btn{flex:1;padding:10px 12px;border-radius:8px;border:1.5px solid #d1d5db;background:#fff;cursor:pointer;text-align:left;font-family:inherit}
.im-btn.on{background:#eff6ff;border-color:#3b82f6}
.im-title{font-size:13px;font-weight:600}
.im-desc{font-size:11px;color:#9ca3af;margin-top:3px}
.alert{padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:12px}
.alert-ok{background:#d1fae5;color:#065f46}
.alert-err{background:#fee2e2;color:#991b1b}
.alert-info{background:#dbeafe;color:#1e40af}
.table-wrap{overflow-x:auto}
.sec{max-width:720px}
.flash{font-size:13px;color:#16a34a;font-weight:500}
input[type=file]{font-size:13px;padding:4px 0}
@media(max-width:640px){.g2,.g3,.g4,.g4b{grid-template-columns:1fr}}
</style>
</head>

async function ss(key,val){
  try{

  }catch(e){
    // fallback to localStorage if offline
    try{localStorage.setItem('sc2_'+key,JSON.stringify(val));}catch{}
    console.warn('Firestore write error:',e.message);
  }
}

// Keep localStorage as offline cache too
function saveLocal(key,val){
  try{localStorage.setItem('sc2_'+key,JSON.stringify(val));}catch{}
}
function getLocal(key){

}

function calcCusto(f){
  const usd=parseFloat(f.preco_usd)||0, qty=parseFloat(f.quantidade)||0;
  const cot=parseFloat(f.cotacao)||0, com=parseFloat(f.comissao_pct)||0;
  const arr=parseFloat(f.arredondamento)||0;
  const tot_us=usd*qty;
  const valor_unit=usd*cot;
  const frete_unt=valor_unit*(com/100);
  const custo_unit=valor_unit+frete_unt+arr;
  const custo_total=custo_unit*qty;
  const frete_total=frete_unt*qty;
  const apagar=f.nota_status==='nota_paga'?frete_total:custo_total;
  return{usd,qty,cot,com,arr,tot_us,valor_unit,frete_unt,custo_unit,custo_total,frete_total,apagar};
}

// Track keys we just saved locally — ignore the echo from Firestore
const _localSaveTs={};

// Save to Firestore + local cache, update STATE immediately
function save(key,val){
  STATE[key]=val;
  saveLocal(key,val);
  _localSaveTs[key]=Date.now(); // mark as locally saved
  ss(key,val);
}

// Real-time listeners — only update from OTHER computers, not our own saves
const _unsubs=[];
function startListeners(){
  const keys=['users','compras','freteiros','comissoes'];
  keys.forEach(key=>{
    const unsub=db.collection(COL).doc(key).onSnapshot(snap=>{
      if(!snap.exists) return;
      // Ignore snapshot if we saved this key less than 3 seconds ago (echo)
      const ts=_localSaveTs[key]||0;
      if(Date.now()-ts<3000) return;
      const val=snap.data().data;
      STATE[key]=val;
      saveLocal(key,val);
      if(STATE._ready) renderPartial(key);
    },err=>console.warn('Listener error:',err));
    _unsubs.push(unsub);
  });
}

// Partial re-render — only re-renders parts affected by key change
function renderPartial(key){
  const v=STATE.view;
  // Always update — no conditional skipping
  if(key==='compras'){
    if(v==='historico') renderPedidosTable();
    else render();
  } else if(key==='comissoes'){
    if(v==='bd') renderBDTable();
    // also re-render nova compra so SKU list updates
  } else {
    render();
  }
}

// Default commission per freteiro (case-insensitive match)
const COM_FRETEIRO={
  'pecinha':18,'marquinho':20,'lu freteira':16,'renato':15,
  'vanessa':15,'rosane':12,'marquinho angel':20
};

function comissaoPorFreteiro(freteiro){
  if(!freteiro) return null;
  const fl=freteiro.toLowerCase().trim();
  // exact match first
  if(COM_FRETEIRO[fl]!==undefined) return COM_FRETEIRO[fl];
  // partial match
  for(const k of Object.keys(COM_FRETEIRO)){
    if(fl.includes(k)||k.includes(fl)) return COM_FRETEIRO[k];
  }
  return null;
}

function buscarComissao(produto,freteiro){
  if(!produto||!freteiro) return null;
  const pu=produto.toUpperCase().trim(),fl=freteiro.toLowerCase().trim();
  // 1) BD: SKU + freteiro specific
  const bd=STATE.comissoes.find(c=>c.produto.toUpperCase().trim()===pu&&c.freteiro.toLowerCase().trim()===fl);
  if(bd) return{pct:bd.comissao,src:'bd'};
  // 2) Default by freteiro name
  const def=comissaoPorFreteiro(freteiro);
  if(def!==null) return{pct:def,src:'freteiro'};
  // 3) Historico fallback
  const hist=[...STATE.compras].filter(c=>(c.produto||'').toUpperCase().trim()===pu&&(c.freteiro||'').toLowerCase().trim()===fl&&(c.comissao_pct||0)>0);
  if(hist.length) return{pct:hist[hist.length-1].comissao_pct,src:'hist'};
  return null;
}

</div>`;
}

function onAcInput(fieldId,val){
  _ac.open=true;_ac.field=fieldId;_ac.q=val;
  // update form state
  if(fieldId==='f-produto'){_formState.produto=val;_formState._autoSrc='';}
  reRenderAC(fieldId);
  // trigger commission lookup
  if(fieldId==='f-produto') updateComissao();
}

function onAcFocus(fieldId){_ac.open=true;_ac.field=fieldId;}

function acSelect(fieldId,val,isNew){
  _ac.open=false;
  document.getElementById(fieldId).value=val;
  if(fieldId==='f-produto'){
    _formState.produto=val;
    if(isNew){
      // Mark as new SKU - will be registered when saved
      _formState._newSku=true;
    }
    updateComissao();
    reRenderAC(fieldId);
  }
}

function reRenderAC(fieldId){
  // Re-render just the AC component by updating the parent cell
  const el=document.getElementById(fieldId);
  if(!el) return;
  const wrap=el.closest('.ac-wrap');
  if(!wrap) return;
  const val=el.value;
  const q=val||'';
  const sugs=q.length>=1?STATE.skus.filter(s=>s.toUpperCase().includes(q.toUpperCase())).slice(0,15):[];
  const isNew=q.length>=2&&!STATE.skus.find(s=>s.toUpperCase()===q.toUpperCase());
  const showDrop=_ac.open&&_ac.field===fieldId&&q.length>=1;
  el.className=isNew?'new-sku':'';

  // remove old dropdown
  const old=wrap.querySelector('.ac-drop');
  if(old) old.remove();
  if(showDrop){
    const drop=document.createElement('div');
    drop.className='ac-drop';
    drop.innerHTML=`
      ${sugs.map(opt=>{
        const idx=opt.toUpperCase().indexOf(q.toUpperCase());
        return `<div class="ac-item" onmousedown="acSelect('${fieldId}','${opt.replace(/'/g,"\\'")}')">
          <span>${escHtml(opt.slice(0,idx))}<span class="ac-match">${escHtml(opt.slice(idx,idx+q.length))}</span>${escHtml(opt.slice(idx+q.length))}</span>
          ${STATE.comissoes.find(c=>c.produto.toUpperCase()===opt.toUpperCase())?'':'<span class="ac-new">hist</span>'}
        </div>`;
      }).join('')}
      ${isNew?`<div class="ac-add-row" onmousedown="acSelect('${fieldId}','${q.replace(/'/g,"\\'")}',true)">+ Cadastrar "${escHtml(q)}" como novo SKU</div>`:''}
    `;
    wrap.appendChild(drop);
  }
}

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function calcItem(it,cot,nota_status){
  const usd=parseFloat(it.preco_usd)||0,qty=parseFloat(it.quantidade)||0;
  const cota=parseFloat(cot)||0,com=parseFloat(it.comissao_pct)||0;
  const arr=parseFloat(it.arredondamento)||0;
  const tot_us=usd*qty,valor_unit=usd*cota,frete_unt=valor_unit*(com/100);
  const custo_unit=valor_unit+frete_unt+arr,custo_total=custo_unit*qty,frete_total=frete_unt*qty;
  const apagar=nota_status==='nota_paga'?frete_total:custo_total;
  return{usd,qty,tot_us,valor_unit,frete_unt,custo_unit,custo_total,frete_total,apagar};
}

// Update only calculated cells for one row — no DOM rebuild
function updateItemCalcs(i){
  const nota=_ped.nota_status,cot=_ped.cotacao;

  const cu=document.getElementById(`it-cu-${i}`);
  const ct=document.getElementById(`it-ct-${i}`);
  const ap=document.getElementById(`it-ap-${i}`);
  const ok=c.qty>0&&c.usd>0;
  if(cu) cu.textContent=ok?fmt(c.custo_unit):'—';
  if(ct) ct.textContent=ok?fmt(c.custo_total):'—';
  if(ap){ap.textContent=ok?fmt(c.apagar):'—';ap.style.color=nota==='nota_paga'?'#15803d':'#c2410c';}
  updateTotals();
}

function updateTotals(){
  const p=_ped;
  const calcs=_itens.map(it=>calcItem(it,p.cotacao,p.nota_status));
  const totUS=calcs.reduce((s,c)=>s+c.tot_us,0);
  const totSemFrete=calcs.reduce((s,c)=>s+c.valor_unit*c.qty,0);
  const totCusto=calcs.reduce((s,c)=>s+c.custo_total,0);
  const totFrete=calcs.reduce((s,c)=>s+c.apagar,0);
  const el=document.getElementById('totais-pedido');
  if(!el) return;
  const itensOk=_itens.length>0&&_itens.every(it=>it.produto&&parseFloat(it.quantidade)>0&&parseFloat(it.preco_usd)>0);
  const canSave=parseFloat(p.cotacao)>0&&!!p.freteiro&&itensOk;
  el.innerHTML=`
    <div class="metric m-blue" style="min-width:130px"><div class="m-lbl">Total U$</div><div class="m-val" style="font-size:14px">$ ${fmtN(totUS,2)}</div></div>
    <div class="metric" style="min-width:140px;border-color:#c4b5fd"><div class="m-lbl">Custo Produto s/ Frete</div><div class="m-val" style="font-size:14px;color:#7c3aed">${fmt(totSemFrete)}</div></div>
    <div class="metric m-blue" style="min-width:140px"><div class="m-lbl">Custo Total c/ Frete</div><div class="m-val" style="font-size:14px">${fmt(totCusto)}</div></div>
    <div class="metric ${p.nota_status==='nota_paga'?'m-green':'m-orange'}" style="min-width:140px">
      <div class="m-lbl">A pagar ao freteiro</div><div class="m-val" style="font-size:14px">${fmt(totFrete)}</div>
      <div class="m-sub">${p.nota_status==='nota_paga'?'só frete':'produto + frete'}</div>
    </div>`;
  const saveBtn=document.getElementById('btn-salvar-pedido');
  if(saveBtn){saveBtn.disabled=!canSave;saveBtn.style.opacity=canSave?'1':'.45';saveBtn.textContent=`Salvar Pedido (${_itens.length} ${_itens.length===1?'item':'itens'})`;}
}

// oninput for number fields — update state + calc in-place, NO table rebuild
function iNumInput(i,field,val){
  _itens[i][field]=val;
  updateItemCalcs(i);
}

// Keyboard nav for number fields: Enter/Tab goes to next logical field
function iNumKey(e,i,field){
  if(e.key==='Enter'||e.key==='Tab'){
    // Tab is handled natively by tabindex, but Enter we advance manually
    if(e.key==='Enter'){
      e.preventDefault();
      const order=['qty','usd','com'];
      const next=order[order.indexOf(field)+1];
      if(next){document.getElementById(`it-${next}-${i}`)?.focus();}
      else{
        // last field of row → go to next row SKU or add new item
        const nxtSku=document.getElementById(`it-sku-${i+1}`);
        if(nxtSku) nxtSku.focus();
        else addItem();
      }
    }
  }
}

// SKU input: update state + dropdown in-place, NO table rebuild
function iSkuInput(i,val){
  _itens[i].produto=val;
  _itens[i]._autoSrc='';
  // auto-fill commission
  const res=buscarComissao(val,_ped.freteiro);
  if(res){
    _itens[i].comissao_pct=String(res.pct);_itens[i]._autoSrc=res.src;
    const cel=document.getElementById(`it-com-${i}`);
    if(cel){cel.value=res.pct;cel.style.background='#f0fdf4';cel.style.borderColor='#86efac';}
    const inp=document.getElementById(`it-sku-${i}`);
    if(inp){inp.style.borderColor='#86efac';inp.style.background='#f0fdf4';}
  } else {
    // No BD match — try freteiro default
    const defCom=comissaoPorFreteiro(_ped.freteiro);
    _itens[i].comissao_pct=defCom!==null?String(defCom):'';
    _itens[i]._autoSrc=defCom!==null?'freteiro':'';
    const cel=document.getElementById(`it-com-${i}`);
    if(cel){
      cel.value=defCom!==null?defCom:'';
      cel.style.background=defCom!==null?'#f0fdf4':'#fff';
      cel.style.borderColor=defCom!==null?'#86efac':'#d1d5db';
    }
    const inp=document.getElementById(`it-sku-${i}`);
    if(inp){inp.style.borderColor=val&&!STATE.skus.find(s=>s.toUpperCase()===val.toUpperCase())?'#fcd34d':'#d1d5db';inp.style.background='#fff';}
  }
  updateItemCalcs(i);
  showItemDrop(i,val);
}

let _acHl=-1; // highlighted index in dropdown

function iSkuFocus(i){_acHl=-1;const v=document.getElementById(`it-sku-${i}`)?.value||"";if(v) showItemDrop(i,v);}
function iSkuBlur(i){hideFloatDrop();}

function iSkuKey(e,i){
  const drop=document.getElementById('global-ac-drop');
  const items=drop?drop.querySelectorAll('.ac-item,.ac-add-row'):[];
  if(e.key==='ArrowDown'){e.preventDefault();_acHl=Math.min(_acHl+1,items.length-1);hlDrop(items);}
  else if(e.key==='ArrowUp'){e.preventDefault();_acHl=Math.max(_acHl-1,-1);hlDrop(items);}
  else if(e.key==='Escape'){_acHl=-1;drop.innerHTML='';}
  else if(e.key==='Enter'||e.key==='Tab'){
    e.preventDefault();
    if(_acHl>=0&&items[_acHl]){
      items[_acHl].dispatchEvent(new MouseEvent('mousedown'));
    } else {
      // Accept typed value as-is
      const val=document.getElementById(`it-sku-${i}`)?.value||'';
      if(val){iSkuBlur(i);document.getElementById(`it-qty-${i}`)?.focus();}
      else if(e.key==='Tab'){iSkuBlur(i);}
    }
  }
}

function hlDrop(items){
  items.forEach((el,j)=>{el.style.background=j===_acHl?'#dbeafe':'';});
}

// Global floating dropdown — escapes overflow containers via position:fixed
let _floatDrop=null;
function hideFloatDrop(){if(_floatDrop){_floatDrop.remove();_floatDrop=null;}_acHl=-1;}

function showItemDrop(i,q){
  hideFloatDrop();
  if(!q||q.length<1) return;
  const inp=document.getElementById(`it-sku-${i}`);
  if(!inp) return;
  const sugs=STATE.skus.filter(s=>s.toUpperCase().includes(q.toUpperCase())).slice(0,14);
  const isNew=q.length>=2&&!STATE.skus.find(s=>s.toUpperCase()===q.toUpperCase());
  if(!sugs.length&&!isNew) return;
  const rect=inp.getBoundingClientRect();
  const div=document.createElement('div');
  div.id='global-ac-drop';
  div.style.cssText='position:fixed;z-index:9999;background:#fff;border:1px solid #d1d5db;border-radius:8px;box-shadow:0 8px 28px rgba(0,0,0,.18);overflow-y:auto;max-height:300px;min-width:'+Math.max(rect.width,280)+'px;left:'+rect.left+'px;top:'+(rect.bottom+3)+'px';
  div.innerHTML=
    sugs.map(opt=>{
      const idx=opt.toUpperCase().indexOf(q.toUpperCase());
      return '<div class="ac-item" onmousedown="selectItemSku('+i+',\''+opt.replace(/'/g,"\\'")+'\')">'
        +'<span>'+escHtml(opt.slice(0,idx))+'<span class="ac-match">'+escHtml(opt.slice(idx,idx+q.length))+'</span>'+escHtml(opt.slice(idx+q.length))+'</span></div>';
    }).join('')+
    (isNew?'<div class="ac-add-row" onmousedown="selectItemSku('+i+',\''+q.replace(/'/g,"\\'")+'\',true)">+ Cadastrar "'+escHtml(q)+'" como novo SKU</div>':'');

function selectItemSku(i,val){
  _itens[i].produto=val;
  const res=buscarComissao(val,_ped.freteiro);
  if(res){_itens[i].comissao_pct=String(res.pct);_itens[i]._autoSrc=res.src;}
  else{
    const defCom=comissaoPorFreteiro(_ped.freteiro);
    _itens[i].comissao_pct=defCom!==null?String(defCom):'';
    _itens[i]._autoSrc=defCom!==null?'freteiro':'';
  }
  // Update SKU input in-place
  const inp=document.getElementById(`it-sku-${i}`);
  if(inp){inp.value=val;inp.style.borderColor=res?'#86efac':'#d1d5db';inp.style.background=res?'#f0fdf4':'#fff';}
  // Update commission input in-place
  const com=document.getElementById(`it-com-${i}`);
  const comVal=_itens[i].comissao_pct;
  const comSrc=_itens[i]._autoSrc;
  if(com){com.value=comVal||'';com.style.background=comSrc?'#f0fdf4':'#fff';com.style.borderColor=comSrc?'#86efac':'#d1d5db';}

function addItem(){
  _itens.push(novoItem());

  if(tbody){

function removeItem(i){

}

function atualizarComissoesItens(){
  _itens.forEach((it,i)=>{

      const res=buscarComissao(it.produto,_ped.freteiro);
      if(res){it.comissao_pct=String(res.pct);it._autoSrc=res.src;}

// When freteiro is selected and items have no commission yet, fill from default
function atualizarComissaoHeader(){
  const def=comissaoPorFreteiro(_ped.freteiro);
  if(def===null) return;
  _itens.forEach((it,i)=>{
    if(!it.comissao_pct||parseFloat(it.comissao_pct)===0){

function salvarPedido(){
  const p=_ped;
  if(p.pedido){
    const exists=STATE.compras.some(c=>c.pedido===p.pedido);
    if(exists){
      if(!confirm(`Pedido "${p.pedido}" já existe no sistema!\nDeseja adicionar estes itens a ele assim mesmo?`)) return;
    }
  }
  // Sync DOM input values to _itens before saving
  _itens.forEach((it,i)=>{
    const domCom=document.getElementById(`it-com-${i}`);
    const domQty=document.getElementById(`it-qty-${i}`);
    const domUsd=document.getElementById(`it-usd-${i}`);
    if(domCom&&domCom.value!=='') it.comissao_pct=domCom.value;
    if(domQty&&domQty.value!=='') it.quantidade=domQty.value;
    if(domUsd&&domUsd.value!=='') it.preco_usd=domUsd.value;
    // If commission still empty/zero, resolve from freteiro default or BD
    if(!(parseFloat(it.comissao_pct)>0)&&it.produto&&p.freteiro){
      const res=buscarComissao(it.produto,p.freteiro);
      if(res) it.comissao_pct=String(res.pct);
    }
  });
  const agora=Date.now();
  const novos=_itens.map((it,i)=>{
    const c=calcItem(it,p.cotacao,p.nota_status);
    return{
      id:agora+i,data:p.data,pedido:p.pedido,nota_status:p.nota_status,
      produto:it.produto.trim(),freteiro:p.freteiro,
      preco_usd:c.usd,quantidade:c.qty,cotacao:parseFloat(p.cotacao)||0,
      arredondamento:parseFloat(it.arredondamento)||0,comissao_pct:c.com,
      custo_unit:+c.custo_unit.toFixed(2),custo_total:+c.custo_total.toFixed(2),
      valor_pagar_freteiro:+c.apagar.toFixed(2),
      usuario:STATE.user.username,origem:'Manual',
      status_lancado:false,status_pago:false
    };
  });
  // Check for items with 0% commission and warn user
  const semComissao=_itens.filter(it=>!(parseFloat(it.comissao_pct)>0)&&it.produto);
  if(semComissao.length){
    const skus=semComissao.map(it=>it.produto).join(', ');
    if(!confirm(`Atenção! Os seguintes produtos estão com comissão 0% ou em branco:\n\n${skus}\n\nDeseja salvar assim mesmo?`)) return;
  }

  // UPSERT comissoes: add new or update existing SKU+freteiro combo
  let comissoesAtualizadas=[...STATE.comissoes];
  _itens.forEach(it=>{
    if(!it.produto||!p.freteiro||!(parseFloat(it.comissao_pct)>0)) return;
    const pu=it.produto.toUpperCase().trim(),fl=p.freteiro.toLowerCase().trim();
    const idx=comissoesAtualizadas.findIndex(c=>c.produto.toUpperCase().trim()===pu&&c.freteiro.toLowerCase().trim()===fl);
    const novaComissao={produto:it.produto.trim(),freteiro:p.freteiro,comissao:parseFloat(it.comissao_pct)};
    if(idx>=0) comissoesAtualizadas[idx]=novaComissao; // UPDATE existing
    else comissoesAtualizadas.push(novaComissao);       // INSERT new
  });
  save('comissoes',comissoesAtualizadas);
  save('compras',[...STATE.compras,...novos]);
  limparPedido();
  const fl=document.getElementById('ped-flash');
  if(fl){fl.style.display='inline';setTimeout(()=>fl.style.display='none',3000);}
}

function limparPedido(){
  _ped={data:TODAY,pedido:'',nota_status:'a_pagar',freteiro:'',cotacao:''};
  _itens=[];
  render();
}

let _hist={ff:'',fd:'',ft:'',fs:'',fp:'',fsku:'',pag:1,editId:null,expanded:{}};
const PP=50;

function filtrarBase(){
  const h=_hist;
  const base=STATE.user.role==='admin'?STATE.compras:STATE.compras.filter(c=>c.usuario===STATE.user.username);
  return base.filter(c=>{
    if(h.ff&&(c.freteiro||'').toLowerCase()!==h.ff.toLowerCase()) return false;
    if(h.fd&&(c.data||'')<h.fd) return false;
    if(h.ft&&(c.data||'')>h.ft) return false;
    if(h.fs&&c.nota_status!==h.fs) return false;
    if(h.fp&&!(c.pedido||'').toLowerCase().includes(h.fp.toLowerCase())) return false;
    if(h.fsku&&!(c.produto||'').toLowerCase().includes(h.fsku.toLowerCase())) return false;
    return true;
  });
}

// Build month options from data
function getMeses(){
  const s=new Set(STATE.compras.map(c=>(c.data||'').slice(0,7)).filter(m=>m.length===7));
  return [...s].sort().reverse();
}

function buildHistorico(){
  const h=_hist;
  if(h.editId) return buildEditarCompra(h.editId);
  const lista=filtrarBase();
  const temFiltro=h.ff||h.fd||h.ft||h.fs||h.fp||h.fsku;

  // Group by pedido — sort by most recent date DESC
  const grupos={};
  lista.forEach(c=>{
    const key=c.pedido||'(sem pedido)';
    if(!grupos[key]) grupos[key]={pedido:key,itens:[],tCusto:0,tFrete:0,tUS:0,tSemFrete:0,data:c.data||'',freteiro:c.freteiro||'',nota:c.nota_status};
    else if((c.data||'')>(grupos[key].data||'')) grupos[key].data=c.data||''; // keep most recent date
    grupos[key].itens.push(c);
    grupos[key].tCusto+=c.custo_total||0;
    grupos[key].tFrete+=c.valor_pagar_freteiro||0;
    grupos[key].tUS+=(c.preco_usd||0)*(c.quantidade||0);
    grupos[key].tSemFrete+=((c.preco_usd||0)*(c.cotacao||0)*(c.quantidade||0));
  });
  const pedidos=Object.values(grupos).sort((a,b)=>{
    const dc=(b.data||'').localeCompare(a.data||'');
    if(dc!==0) return dc;
    return (b.pedido||'').localeCompare(a.pedido||''); // tie-break by pedido number
  });
  const totalPags=Math.ceil(pedidos.length/PP)||1;
  const pagPedidos=pedidos.slice((h.pag-1)*PP,h.pag*PP);
  const tCusto=lista.reduce((s,c)=>s+(c.custo_total||0),0);
  const tFrete=lista.reduce((s,c)=>s+(c.valor_pagar_freteiro||0),0);
  const meses=getMeses();

  return `<div>
  <div class="page-title">Pedidos</div>
  <div class="fbox">
    <div class="fbox-title">Filtros
      ${temFiltro?`<button class="btn btn-sm" onclick="_hist.ff=_hist.fd=_hist.ft=_hist.fs=_hist.fp=_hist.fsku='';_hist.pag=1;render()">Limpar</button>`:''}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:8px">
      <div><label class="L">Pedido ERP</label><input value="${escHtml(h.fp)}" placeholder="buscar..." oninput="_hist.fp=this.value;_hist.pag=1;renderPedidosTable()"></div>
      <div><label class="L">SKU</label><input value="${escHtml(h.fsku)}" placeholder="buscar SKU..." oninput="_hist.fsku=this.value;_hist.pag=1;renderPedidosTable()"></div>
      <div><label class="L">Freteiro</label>
        <select onchange="_hist.ff=this.value;_hist.pag=1;renderPedidosTable()">
          <option value="">Todos</option>${STATE.freteiros.map(f=>`<option value="${escHtml(f)}"${h.ff===f?' selected':''}>${escHtml(f)}</option>`).join('')}
        </select>
      </div>
      <div><label class="L">Status</label>
        <select onchange="_hist.fs=this.value;_hist.pag=1;renderPedidosTable()">
          <option value="">Todos</option>
          <option value="a_pagar"${h.fs==='a_pagar'?' selected':''}>A Pagar</option>
          <option value="nota_paga"${h.fs==='nota_paga'?' selected':''}>Nota Paga</option>
        </select>
      </div>
      <div><label class="L">Data de</label><input type="date" value="${h.fd||''}" onchange="_hist.fd=this.value;_hist.pag=1;renderPedidosTable()"></div>
      <div><label class="L">Data até</label><input type="date" value="${h.ft||''}" onchange="_hist.ft=this.value;_hist.pag=1;renderPedidosTable()"></div>
    </div>
  </div>
  <div class="metrics" id="hist-metrics">
    ${buildHistMetrics(lista)}
  </div>
  <div id="hist-table">${buildPedidosTable(pagPedidos,pedidos.length,totalPags)}</div>
</div>`;
}

function togglePedido(ped){

// Build group-level status checkbox (checked if ALL items have that status)
function buildStatusCheck(itens,tipo,ped){
  const field='status_'+tipo;
  const allChecked=itens.length>0&&itens.every(c=>c[field]);
  const someChecked=itens.some(c=>c[field]);
  const label='Lançado';
  return `<label class="lancado-label ${allChecked?'checked':''}" title="${label}">
    <input type="checkbox" ${allChecked?'checked':''} ${someChecked&&!allChecked?'style="opacity:.6"':''}
      onchange="togglePedidoStatus('${ped.replace(/'/g,"\'")}','${field}',this.checked);this.closest('label').classList.toggle('checked',this.checked)"
      style="width:15px;height:15px;accent-color:#16a34a;cursor:pointer">
    ${label}
  </label>`;
}

// Build single-item status checkbox
function buildItemCheck(c,tipo){
  const field='status_'+tipo;
  const checked=!!c[field];
  const label='Lançado';
  return `<label class="lancado-label ${checked?'checked':''}" title="${label}">
    <input type="checkbox" ${checked?'checked':''}
      onchange="toggleItemStatus(${c.id},'${field}',this.checked);this.closest('label').classList.toggle('checked',this.checked)"
      style="width:15px;height:15px;accent-color:#16a34a;cursor:pointer">
    ${label}
  </label>`;
}

// Toggle status for all items in a pedido
function togglePedidoStatus(ped,field,val){
  const updated=STATE.compras.map(c=>(c.pedido||'(sem pedido)')===ped?{...c,[field]:val}:c);
  save('compras',updated);
  renderPedidosTable();
}

// Toggle status for a single item
function toggleItemStatus(id,field,val){
  const updated=STATE.compras.map(c=>c.id===id?{...c,[field]:val}:c);
  save('compras',updated);
  renderPedidosTable();
}

function renderPedidosTable(){
  const lista=filtrarBase();
  const h=_hist;
  const grupos={};
  lista.forEach(c=>{
    const key=c.pedido||'(sem pedido)';
    if(!grupos[key]) grupos[key]={pedido:key,itens:[],tCusto:0,tFrete:0,tSemFrete:0,data:c.data||'',freteiro:c.freteiro||'',nota:c.nota_status};
    else if((c.data||'')>(grupos[key].data||'')) grupos[key].data=c.data||'';
    grupos[key].itens.push(c);grupos[key].tCusto+=c.custo_total||0;grupos[key].tFrete+=c.valor_pagar_freteiro||0;grupos[key].tSemFrete+=((c.preco_usd||0)*(c.cotacao||0)*(c.quantidade||0));
  });
  const pedidos=Object.values(grupos).sort((a,b)=>{
    const dc=(b.data||'').localeCompare(a.data||'');
    if(dc!==0) return dc;
    return (b.pedido||'').localeCompare(a.pedido||'');
  });
  const totalPags=Math.ceil(pedidos.length/PP)||1;
  const pagPedidos=pedidos.slice((h.pag-1)*PP,h.pag*PP);
  const m=document.getElementById('hist-metrics');
  if(m) m.innerHTML=buildHistMetrics(lista);
  const t=document.getElementById('hist-table');
  if(t) t.innerHTML=buildPedidosTable(pagPedidos,pedidos.length,totalPags);
}

function delPedido(ped){
  const itens=STATE.compras.filter(c=>(c.pedido||'(sem pedido)')===ped);
  if(!confirm(`Apagar pedido ${ped} com ${itens.length} item(ns)?\nEsta ação não pode ser desfeita!`)) return;
  if(!confirm(`CONFIRME: Apagar permanentemente o pedido ${ped}?`)) return;
  save('compras',STATE.compras.filter(c=>(c.pedido||'(sem pedido)')!==ped));
  renderPedidosTable();
}

function delCompra(id){
  if(!confirm('Apagar este item? Esta ação não pode ser desfeita!')) return;
  if(!confirm('CONFIRME: Apagar permanentemente este item?')) return;
  save('compras',STATE.compras.filter(c=>c.id!==id));
  renderPedidosTable();
}

function startEdit(id){_hist.editId=id;render();}

function buildEditarCompra(id){
  const c=STATE.compras.find(x=>x.id===id);
  if(!c) return '<p>Não encontrado.</p>';
  _formState={
    data:c.data||TODAY,pedido:c.pedido||'',nota_status:c.nota_status||'a_pagar',
    produto:c.produto||'',freteiro:c.freteiro||'',
    preco_usd:String(c.preco_usd||''),quantidade:String(c.quantidade||''),
    cotacao:String(c.cotacao||''),arredondamento:String(c.arredondamento||0),
    comissao_pct:String(c.comissao_pct||''),_autoSrc:'',_newSku:false
  };

function cancelarEdicao(){_hist.editId=null;render();}
function salvarEdicao(){
  const f=_formState;
  const c=calcCusto(f);
  const id=_hist.editId;
  const updated={...STATE.compras.find(x=>x.id===id),
    data:f.data,pedido:f.pedido,nota_status:f.nota_status,

    preco_usd:c.usd,quantidade:c.qty,cotacao:c.cot,arredondamento:c.arr,comissao_pct:c.com,
    custo_unit:+c.custo_unit.toFixed(2),custo_total:+c.custo_total.toFixed(2),valor_pagar_freteiro:+c.apagar.toFixed(2)
  };
  save('compras',STATE.compras.map(x=>x.id===id?updated:x));
  _hist.editId=null;
  _formState={...EMPTY,_autoSrc:'',_newSku:false};
  render();

// Inline pedido edit — click on pedido cell to edit in-place
function editPedido(id,span){
  const cur=STATE.compras.find(c=>c.id===id)?.pedido||'';
  const inp=document.createElement('input');
  inp.value=cur;
  inp.style.cssText='width:90px;padding:3px 6px;border:1px solid #3b82f6;border-radius:4px;font-size:13px;font-weight:600;color:#1d4ed8;outline:none';
  span.replaceWith(inp);
  inp.focus();inp.select();
  const commit=()=>{
    const val=inp.value.trim();
    // Update all records with same id (single record edit)
    save('compras',STATE.compras.map(c=>c.id===id?{...c,pedido:val}:c));
    // Update cell in-place without re-render
    const newSpan=document.createElement('span');
    newSpan.id=`ped-cell-${id}`;
    newSpan.style.cssText='font-weight:600;color:#374151;cursor:pointer;border-bottom:1px dashed #93c5fd';
    newSpan.title='Clique para editar';
    newSpan.textContent=val||'—';
    newSpan.onclick=function(){editPedido(id,this);};
    inp.replaceWith(newSpan);
  };
  inp.onblur=commit;
  inp.onkeydown=e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=cur;inp.blur();}};
}

      <button class="im-btn ${_imp.modo==='substituir'?'on':''}" onclick="_imp.modo='substituir';render()"><div class="im-title">Substituir tudo</div><div class="im-desc">Apaga tudo e importa apenas o arquivo</div></button>
    </div>
  </div>
  <div style="margin-bottom:16px"><label class="L">Selecione o arquivo JSON</label>
    <input type="file" accept=".json" onchange="lerArquivo(event)">
  </div>
  ${_imp.status?`<div class="alert ${_imp.status.startsWith('Erro')?'alert-err':'alert-ok'}">${escHtml(_imp.status)}</div>`:''}
  ${_imp.preview?`<div class="alert alert-info"><strong>${_imp.preview.length.toLocaleString()} registros</strong> prontos para importar${_imp.modo==='substituir'?` <span style="color:#dc2626">— apagará os ${STATE.compras.length.toLocaleString()} atuais!</span>`:''}</div>`:''}
  <div style="display:flex;gap:12px">
    <button class="btn btn-blue" style="padding:10px 24px;${_imp.preview?'':'opacity:.5;cursor:not-allowed'}" onclick="${_imp.preview?'fazerImport()':'void 0'}">Importar agora</button>
    ${_imp.preview?`<button class="btn" style="padding:10px 18px" onclick="_imp.preview=null;_imp.status='';render()">Cancelar</button>`:''}
  </div>
</div>`;
}

function lerArquivo(e){
  const file=e.target.files[0];if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{
    try{const d=JSON.parse(ev.target.result);if(!Array.isArray(d)) throw new Error();_imp.preview=d;_imp.status=`✓ ${d.length.toLocaleString()} registros encontrados`;}
    catch{_imp.status='Erro: arquivo inválido.';_imp.preview=null;}
    render();
  };
  r.readAsText(file);
}

function fazerImport(){
  if(!_imp.preview) return;
  const base=_imp.modo==='substituir'?[]:STATE.compras;
  const maxId=base.reduce((m,c)=>Math.max(m,c.id||0),0);
  const novos=_imp.preview.map((c,i)=>({...c,id:maxId+i+1}));
  const merged=_imp.modo==='substituir'?novos:[...base,...novos];
  save('compras',merged);
  _imp.status=`✓ ${novos.length.toLocaleString()} importados! Total: ${merged.length.toLocaleString()}`;
  _imp.preview=null;
  render();
}

// ─── ATRIBUIR PEDIDO ─────────────────────────────────────────────────────────
function atribuirPedido(){
  const num=prompt('Atribuir número de pedido aos itens "sem pedido":');
  if(!num||!num.trim()) return;
  const n=num.trim();
  if(STATE.compras.find(c=>c.pedido===n)){
    if(!confirm(`Pedido ${n} já existe. Mesclar os itens sem pedido nele?`)) return;
  }
  save('compras',STATE.compras.map(c=>(!c.pedido||c.pedido==='(sem pedido)')?{...c,pedido:n}:c));
  renderPedidosTable();
}

function copiarSKU(el,sku){
  navigator.clipboard.writeText(sku).then(()=>{
    el.classList.add('sku-copied');
    setTimeout(()=>el.classList.remove('sku-copied'),1500);
  }).catch(()=>{
    // fallback for older browsers
    const ta=document.createElement('textarea');
    ta.value=sku;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    el.classList.add('sku-copied');
    setTimeout(()=>el.classList.remove('sku-copied'),1500);
  });
}

// ─── INIT — load from Firestore, fallback to localStorage, then defaults ─────
(async()=>{
  // Show loading screen
  document.getElementById('root').innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px">
      <div style="width:44px;height:44px;border:3px solid #e5e7eb;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.8s linear infinite"></div>
      <div style="color:#6b7280;font-size:14px">Conectando ao banco de dados...</div>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;

  const keys=['users','compras','freteiros','comissoes'];
  const defaults={
    users:[
      {id:1,username:'admin',password:'admin123',role:'admin',nome:'Administrador'},
      {id:2,username:'usuario',password:'123456',role:'user',nome:'Usuário Padrão'},
    ],
    compras:DEF_COMPRAS,
    freteiros:DEF_FRETEIROS,
    comissoes:DEF_COMISSOES
  };

  try{
    // Try Firestore first
    const promises=keys.map(k=>db.collection(COL).doc(k).get());
    const snaps=await Promise.all(promises);
    snaps.forEach((snap,i)=>{
      const k=keys[i];
      if(snap.exists){
        // Always use Firestore data — never stale local cache
        STATE[k]=snap.data().data;
        saveLocal(k,STATE[k]);
      } else {
        // First time: seed from defaults (skip huge DEF_COMPRAS on first run)
        STATE[k]=defaults[k];
        if(k!=='compras') ss(k,STATE[k]);
      }
    });
    STATE._ready=true;
    startListeners();
    render();
  }catch(e){
    // Offline or Firebase error — load from localStorage cache
    console.warn('Firebase offline, using local cache:',e.message);
    keys.forEach(k=>{
      const local=getLocal(k);
      if(local) STATE[k]=local;
    });
    STATE._ready=true;
    document.getElementById('root').innerHTML+='';
    render();
    // Show offline banner
    setTimeout(()=>{
      const b=document.createElement('div');
      b.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#f59e0b;color:#fff;text-align:center;padding:8px;font-size:13px;z-index:9999';
      b.innerHTML='⚠ Modo offline — alterações salvas localmente e sincronizadas quando reconectar';
      document.body.appendChild(b);
    },100);
  }
})();
</script>
